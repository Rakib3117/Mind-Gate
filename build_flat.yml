name: Build MindGate APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure
        run: |
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/data/model
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/data/datastore
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/service
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/receiver
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/ui/screens
          mkdir -p MindGate/app/src/main/java/com/mindgate/app/ui/theme
          mkdir -p MindGate/app/src/main/res/drawable
          mkdir -p MindGate/app/src/main/res/values
          mkdir -p MindGate/app/src/main/res/xml
          mkdir -p MindGate/app/src/main/res/mipmap-hdpi
          mkdir -p MindGate/app/src/main/res/mipmap-mdpi
          mkdir -p MindGate/app/src/main/res/mipmap-xhdpi
          mkdir -p MindGate/app/src/main/res/mipmap-xxhdpi
          mkdir -p MindGate/app/src/main/res/mipmap-xxxhdpi
          mkdir -p MindGate/gradle/wrapper

          cp Models.kt                       MindGate/app/src/main/java/com/mindgate/app/data/model/
          cp MindGateDataStore.kt            MindGate/app/src/main/java/com/mindgate/app/data/datastore/
          cp MindGateApp.kt                  MindGate/app/src/main/java/com/mindgate/app/
          cp MainActivity.kt                 MindGate/app/src/main/java/com/mindgate/app/
          cp MindGateAccessibilityService.kt MindGate/app/src/main/java/com/mindgate/app/service/
          cp MonitorService.kt               MindGate/app/src/main/java/com/mindgate/app/service/
          cp Receivers.kt                    MindGate/app/src/main/java/com/mindgate/app/receiver/
          cp GateOverlayActivity.kt          MindGate/app/src/main/java/com/mindgate/app/ui/screens/
          cp SessionSetActivity.kt           MindGate/app/src/main/java/com/mindgate/app/ui/screens/
          cp Theme.kt                        MindGate/app/src/main/java/com/mindgate/app/ui/theme/

          cp AndroidManifest.xml             MindGate/app/src/main/
          cp strings.xml                     MindGate/app/src/main/res/values/
          cp themes.xml                      MindGate/app/src/main/res/values/
          cp accessibility_service_config.xml MindGate/app/src/main/res/xml/
          cp ic_shield.xml                   MindGate/app/src/main/res/drawable/
          cp ic_launcher_background.xml      MindGate/app/src/main/res/drawable/
          cp ic_launcher_foreground.xml      MindGate/app/src/main/res/drawable/

          for density in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp ic_launcher.xml               MindGate/app/src/main/res/${density}/
            cp ic_launcher_round.xml         MindGate/app/src/main/res/${density}/
          done

          cp app_build.gradle                MindGate/app/build.gradle
          cp root_build.gradle               MindGate/build.gradle
          cp settings.gradle                 MindGate/settings.gradle
          cp proguard-rules.pro              MindGate/app/
          cp gradle-wrapper.properties       MindGate/gradle/wrapper/

      - name: Download Gradle Wrapper JAR
        run: |
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -O MindGate/gradle/wrapper/gradle-wrapper.jar
          ls -lh MindGate/gradle/wrapper/

      - name: Setup Gradle Wrapper Script
        run: |
          cat > MindGate/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME="${0%/*}/"
          APP_HOME="$(cd "$APP_HOME" && pwd -P)" || exit
          CLASSPATH="${APP_HOME}/gradle/wrapper/gradle-wrapper.jar"
          if [ -n "$JAVA_HOME" ] ; then
              JAVACMD="$JAVA_HOME/bin/java"
          else
              JAVACMD=java
          fi
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          eval set -- $DEFAULT_JVM_OPTS '"$JAVA_OPTS"' '"$GRADLE_OPTS"' \
            '"-Dorg.gradle.appname=$APP_BASE_NAME"' \
            -classpath '"$CLASSPATH"' \
            org.gradle.wrapper.GradleWrapperMain '"$@"'
          exec "$JAVACMD" "$@"
          GRADLEW
          chmod +x MindGate/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: MindGate
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MindGate-debug
          path: MindGate/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
